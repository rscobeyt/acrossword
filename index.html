<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acrossword</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#f5f5f0;display:flex;align-items:flex-start;justify-content:center;min-height:100vh;padding:24px 16px;font-family:'Libre Franklin',sans-serif;}
.wrap{background:#fff;color:#121212;width:100%;max-width:960px;padding:20px;border-radius:8px;border:1px solid #e2e2e2;position:relative;}
.header{display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid #121212;padding-bottom:12px;margin-bottom:16px;}
.logo{font-size:24px;font-weight:700;letter-spacing:2px;text-transform:uppercase;}
.logo span{color:#c00;}
.turn-bar{display:flex;align-items:center;gap:10px;}
.player-pill{padding:5px 14px;border-radius:2px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;border:2px solid #121212;}
.player-pill.p1{background:#121212;color:#fff;}
.player-pill.p2{background:#c00;color:#fff;border-color:#c00;}
.turns-left{font-size:11px;color:#767676;font-weight:600;}
.score-bar{display:flex;gap:0;margin-bottom:14px;border:1px solid #e2e2e2;border-radius:3px;overflow:hidden;}
.score-block{flex:1;text-align:center;padding:12px;}
.score-name{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#767676;margin-bottom:4px;}
.score-num{font-size:26px;font-weight:700;font-family:'DM Mono',monospace;}
.score-block.p1 .score-num{color:#121212;}
.score-block.p2 .score-num{color:#c00;}
.score-divider{width:1px;background:#e2e2e2;}
.main{display:grid;grid-template-columns:auto 220px;gap:20px;align-items:start;}
.grid-outer{overflow-x:visible;}
.cw-grid{display:inline-grid;gap:1.5px;background:#121212;border:2px solid #121212;margin:0 auto 12px;}
.cell{width:var(--cell-size,26px);height:var(--cell-size,26px);background:#fff;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:var(--cell-font,11px);font-weight:500;color:#121212;position:relative;text-transform:uppercase;user-select:none;cursor:pointer;}
.cell.black{background:#121212;cursor:default;}
.cell.hidden{background:#121212;cursor:default;}
.cell.open{background:#fff;}
.cell.correct{background:#fff;color:#121212;cursor:default;}
.cell.partial{background:#fffbe6;}
.cell.hl-word{background:#c4e4ff;}
.cell.hl-word.dir-d{background:#ffd6a5;}
.cell.hl-cursor{background:#f5c842;}
.cell-num{position:absolute;top:1px;left:2px;font-size:7px;color:#121212;line-height:1;font-family:'Libre Franklin',sans-serif;font-weight:700;pointer-events:none;}
.cell.hidden .cell-num{display:none;}
.sidebar{}
.clue-box{border:2px solid #121212;border-radius:3px;padding:14px;margin-bottom:10px;}
.clue-box-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.clue-box-title{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#767676;}
.clue-arrows{display:flex;gap:4px;}
.arr-btn{background:#fff;border:1px solid #ccc;color:#121212;width:24px;height:24px;font-size:13px;cursor:pointer;border-radius:2px;display:flex;align-items:center;justify-content:center;line-height:1;}
.arr-btn:hover{background:#f0f0f0;}
.clue-dir{display:inline-block;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:2px 8px;border-radius:2px;margin-bottom:5px;}
.clue-dir.across{background:#e8f4ff;color:#1a6fa8;}
.clue-dir.down{background:#fff4e8;color:#a86a1a;}
.clue-num{font-size:11px;font-weight:700;margin-bottom:4px;}
.clue-text{font-size:13px;line-height:1.5;margin-bottom:12px;min-height:36px;color:#121212;}
.submit-btn{width:100%;background:#121212;color:#fff;border:none;padding:9px 0;font-family:'Libre Franklin',sans-serif;font-size:11px;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:.8px;border-radius:2px;margin-bottom:6px;}
.submit-btn:hover{background:#333;}
.submit-btn:disabled{background:#ccc;cursor:default;}
.pass-btn{width:100%;background:#fff;border:1.5px solid #ccc;color:#767676;padding:7px 0;font-family:'Libre Franklin',sans-serif;font-size:10px;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:.8px;border-radius:2px;}
.pass-btn:hover{border-color:#121212;color:#121212;}
.open-clues-box{border:1.5px solid #e2e2e2;border-radius:3px;padding:10px;margin-bottom:10px;max-height:200px;overflow-y:auto;}
.oc-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#767676;margin-bottom:6px;}
.clue-row{display:flex;align-items:flex-start;gap:5px;padding:5px 6px;border-radius:2px;cursor:pointer;border:1px solid transparent;margin-bottom:2px;}
.clue-row:hover{background:#f8f8f8;border-color:#e2e2e2;}
.clue-row.selected{background:#fffbe6;border-color:#f5c842;}
.cr-dir{font-size:8px;font-weight:700;text-transform:uppercase;padding:2px 4px;border-radius:1px;flex-shrink:0;margin-top:1px;}
.cr-dir.across{background:#e8f4ff;color:#1a6fa8;}
.cr-dir.down{background:#fff4e8;color:#a86a1a;}
.cr-num{font-size:9px;font-weight:700;font-family:'DM Mono',monospace;flex-shrink:0;min-width:20px;}
.cr-text{font-size:10px;color:#333;line-height:1.4;flex:1;}
.log-box{border:1.5px solid #e2e2e2;border-radius:3px;padding:10px;max-height:160px;overflow-y:auto;}
.log-tag{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#767676;margin-bottom:6px;}
.log-item{font-size:10px;padding:3px 0;border-bottom:1px solid #f5f5f5;line-height:1.5;color:#333;}
.log-item:last-child{border-bottom:none;}
.li-p1{color:#121212;font-weight:700;}
.li-p2{color:#c00;font-weight:700;}
.bonus-flash{display:inline-block;background:#f5c842;color:#121212;font-size:9px;font-weight:700;padding:1px 5px;border-radius:2px;margin-left:4px;}
.drop-zone{border:2px dashed #ccc;border-radius:4px;padding:60px 20px;text-align:center;cursor:pointer;transition:border-color .2s;margin-bottom:0;}
.drop-zone:hover,.drop-zone.over{border-color:#121212;}
.drop-title{font-size:20px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;}
.drop-sub{font-size:13px;color:#767676;line-height:1.9;}
.drop-link{color:#326891;}
.file-input{display:none;}
.puzzle-meta{font-size:10px;color:#767676;margin-bottom:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;}
.modal-bg{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,.96);border-radius:8px;display:flex;align-items:center;justify-content:center;z-index:20;}
.modal-box{background:#fff;border:2px solid #121212;border-radius:3px;padding:32px 28px;max-width:320px;width:100%;text-align:center;}
.modal-title{font-size:20px;font-weight:700;text-transform:uppercase;letter-spacing:2px;margin-bottom:8px;}
.modal-sub{font-size:13px;color:#767676;margin-bottom:20px;line-height:1.7;}
.win-btn{width:100%;background:#121212;color:#fff;border:none;padding:12px;font-family:'Libre Franklin',sans-serif;font-size:12px;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:.8px;margin-top:4px;}
.win-btn:hover{background:#333;}
.shake{animation:shake .3s;}
.auto-btn{background:#121212;color:#fff;border:none;padding:10px 20px;font-family:'Libre Franklin',sans-serif;font-size:12px;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:.8px;border-radius:2px;}
.auto-btn:hover{background:#333;}
.auto-btn:disabled{background:#ccc;cursor:default;}
.src-btn{background:#fff;border:1.5px solid #ccc;color:#767676;padding:8px 0;font-family:'Libre Franklin',sans-serif;font-size:11px;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:.5px;border-radius:2px;transition:all .15s;}
.src-btn:hover{border-color:#121212;color:#121212;}
.src-btn.active{background:#121212;color:#fff;border-color:#121212;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
</style>
</head>
<body>
<div class="wrap" id="wrap">
  <div class="header">
    <div class="logo">Across<span>word</span></div>
    <div class="turn-bar">
      <div class="player-pill p1" id="turn-pill">P1</div>
      <div class="turns-left" id="turns-left">1 turn left</div>
    </div>
  </div>
  <div id="main-area">
    <div style="max-width:400px;margin:0 auto;padding:60px 20px;text-align:center;">
      <div style="font-size:26px;font-weight:700;letter-spacing:3px;text-transform:uppercase;margin-bottom:4px;">Across<span style="color:#c00">word</span></div>
      <div style="font-size:12px;color:#767676;margin-bottom:32px;letter-spacing:.5px;">A crossword board game for two players</div>
      <div id="load-status" style="font-size:12px;color:#767676;margin-bottom:16px;">Loading today's puzzle...</div>
      <div style="border-top:1px solid #e2e2e2;padding-top:20px;margin-top:8px;">
        <div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#767676;margin-bottom:8px;">Or upload your own .puz file</div>
        <div class="drop-zone" id="dz" onclick="document.getElementById('fi').click()" ondragover="dzo(event)" ondragleave="dzl()" ondrop="dzd(event)" style="padding:16px;margin-bottom:0;">
          <div style="font-size:12px;color:#767676;">Drop a .puz file here or click to browse</div>
          <input type="file" id="fi" class="file-input" accept=".puz" onchange="loadFile(this.files[0])">
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const G={
  puzzle:null,clues:{across:{},down:{}},
  allClueOrder:[],
  openQuadrants:new Set(),
  solvedClues:new Set(),
  solvedCells:new Set(),
  partialCells:{},
  typedCells:{},
  activeKey:null,
  cursor:0,
  numMap:{},
  quadrantMap:{},
  scores:{1:0,2:0},
  currentPlayer:1,
  turnsLeft:1,
  turnCount:0,
  gameOver:false,
  log:[],
};

function ck(c){return c.dir+c.num;}
function getClue(k){if(!k)return null;const dir=k.startsWith('across')?'across':'down';const num=parseInt(k.replace(dir,''));return G.clues[dir][num]||null;}
function getActive(){return getClue(G.activeKey);}

// Pick a random date from the WSJ archive (Saturdays, 2014–today)
function randomSaturdayDate(){
  const start=new Date(2014,0,4); // first Saturday in 2014
  const now=new Date();
  // Find all Saturdays between start and now
  const saturdays=[];
  const d=new Date(start);
  while(d<=now){
    if(d.getDay()===6)saturdays.push(new Date(d));
    d.setDate(d.getDate()+1);
  }
  const picked=saturdays[Math.floor(Math.random()*saturdays.length)];
  const yy=String(picked.getFullYear()).slice(2);
  const mm=String(picked.getMonth()+1).padStart(2,'0');
  const dd=String(picked.getDate()).padStart(2,'0');
  return `${yy}${mm}${dd}`;
}

async function autoLoadRandom(){
  const status=document.getElementById('load-status');
  // Try up to 5 random dates in case one is missing
  for(let attempt=0;attempt<5;attempt++){
    const dateStr=randomSaturdayDate();
    try{
      const res=await fetch(`/.netlify/functions/fetch-puzzle?source=wsj&date=${dateStr}`);
      if(!res.ok)continue;
      const json=await res.json();
      if(json.error)continue;
      const binary=atob(json.data);
      const u8=new Uint8Array(binary.length);
      for(let i=0;i<binary.length;i++)u8[i]=binary.charCodeAt(i);
      parsePuz(u8);
      return;
    }catch(e){continue;}
  }
  if(status)status.textContent='Could not load a puzzle. Try uploading a .puz file below.';
}

// Auto-load on page open
window.addEventListener('DOMContentLoaded', autoLoadRandom);

function dzo(e){e.preventDefault();document.getElementById('dz').classList.add('over');}
function dzl(){document.getElementById('dz').classList.remove('over');}
function dzd(e){e.preventDefault();dzl();const f=e.dataTransfer.files[0];if(f)loadFile(f);}
function loadFile(f){const r=new FileReader();r.onload=e=>{try{parsePuz(new Uint8Array(e.target.result));}catch(err){alert('Could not read this .puz file: '+err.message);}};r.readAsArrayBuffer(f);}

function parsePuz(u8){
  const w=u8[0x2C],h=u8[0x2D],nc=u8[0x2E]|(u8[0x2F]<<8);
  const sol=[];
  for(let r=0;r<h;r++){const row=[];for(let c=0;c<w;c++)row.push(String.fromCharCode(u8[0x34+r*w+c]));sol.push(row);}
  let pos=0x34+w*h*2;
  function rs(){let s='';while(pos<u8.length&&u8[pos]!==0){s+=String.fromCharCode(u8[pos]);pos++;}pos++;return s;}
  const title=rs(),author=rs();rs();
  const cs=[];for(let i=0;i<nc;i++)cs.push(rs());
  const numbered=[];let n=1;
  for(let r=0;r<h;r++)for(let c=0;c<w;c++){
    if(sol[r][c]==='.')continue;
    const aS=(c===0||sol[r][c-1]==='.')&&c+1<w&&sol[r][c+1]!=='.';
    const dS=(r===0||!sol[r-1]||sol[r-1][c]==='.')&&r+1<h&&sol[r+1]&&sol[r+1][c]!=='.';
    if(aS||dS){numbered.push({n,r,c,aS,dS});n++;}
  }
  const aC={},dC={};let ci=0;const order=[];
  for(const {n,r,c,aS,dS} of numbered){
    if(aS){let cells=[];for(let cc=c;cc<w&&sol[r][cc]!=='.';cc++)cells.push([r,cc]);const cl={num:n,clue:cs[ci++],cells,answer:cells.map(([rr,cc])=>sol[rr][cc]).join(''),dir:'across'};aC[n]=cl;order.push(ck(cl));}
    if(dS){let cells=[];for(let rr=r;rr<h&&sol[rr][c]!=='.';rr++)cells.push([rr,c]);const cl={num:n,clue:cs[ci++],cells,answer:cells.map(([rr,cc])=>sol[rr][cc]).join(''),dir:'down'};dC[n]=cl;order.push(ck(cl));}
  }
  const numMap={};n=1;
  for(let r=0;r<h;r++)for(let c=0;c<w;c++){
    if(sol[r][c]==='.')continue;
    const aS=(c===0||sol[r][c-1]==='.')&&c+1<w&&sol[r][c+1]!=='.';
    const dS=(r===0||!sol[r-1]||sol[r-1][c]==='.')&&r+1<h&&sol[r+1]&&sol[r+1][c]!=='.';
    if(aS||dS){numMap[r+','+c]=n;n++;}
  }
  const midR=Math.floor(h/2),midC=Math.floor(w/2);
  const quadrantMap={};
  for(let r=0;r<h;r++)for(let c=0;c<w;c++){
    if(sol[r][c]==='.')continue;
    quadrantMap[r+','+c]=(r<midR?0:2)+(c<midC?0:1);
  }
  G.puzzle={title,author,width:w,height:h,solution:sol,midR,midC};
  G.clues={across:aC,down:dC};
  G.allClueOrder=order;
  G.numMap=numMap;
  G.quadrantMap=quadrantMap;
  G.totalCells=sol.flat().filter(x=>x!=='.').length;
  G.openQuadrants=new Set([0]);
  G.solvedClues=new Set();G.solvedCells=new Set();G.partialCells={};G.typedCells={};
  G.scores={1:0,2:0};G.currentPlayer=1;G.turnsLeft=1;G.turnCount=0;G.log=[];
  G.activeKey=null;G.cursor=0;
  const first=getOpenClues();
  if(first.length)G.activeKey=first[0];
  buildUI();
}

function getOpenClues(){
  return G.allClueOrder.filter(k=>{
    if(G.solvedClues.has(k))return false;
    const cl=getClue(k);if(!cl)return false;
    return cl.cells.some(([r,c])=>G.openQuadrants.has(G.quadrantMap[r+','+c]));
  });
}

function isCellVisible(r,c){
  const q=G.quadrantMap[r+','+c];
  return q!==undefined&&G.openQuadrants.has(q);
}

function buildUI(){
  const{width:w,height:h,title,author}=G.puzzle;
  document.getElementById('main-area').innerHTML=`
    <div class="puzzle-meta">${title||'Untitled'}${author?' · '+author:''}</div>
    <div class="score-bar">
      <div class="score-block p1"><div class="score-name">Player 1</div><div class="score-num" id="s1">0</div></div>
      <div class="score-divider"></div>
      <div class="score-block p2"><div class="score-name">Player 2</div><div class="score-num" id="s2">0</div></div>
    </div>
    <div class="main">
      <div class="grid-outer">
        <div class="cw-grid" id="cw-grid" style="grid-template-columns:repeat(${w},var(--cell-size,26px))"></div>
      </div>
      <div class="sidebar">
        <div class="clue-box">
          <div class="clue-box-header">
            <div class="clue-box-title">Active clue</div>
            <div class="clue-arrows">
              <button class="arr-btn" onclick="prevClue()">&#8592;</button>
              <button class="arr-btn" onclick="nextClue()">&#8594;</button>
            </div>
          </div>
          <div id="act-dir-wrap"></div>
          <div class="clue-num" id="act-num"></div>
          <div class="clue-text" id="act-text">Select a clue to begin</div>
          <button class="submit-btn" id="sub-btn" onclick="submitAnswer()" disabled>Submit answer</button>
          <button class="pass-btn" onclick="passTurn()">Pass turn</button>
        </div>
        <div class="open-clues-box">
          <div class="oc-label">Open clues</div>
          <div id="open-clue-list"></div>
        </div>
        <div class="log-box">
          <div class="log-tag">Game log</div>
          <div id="game-log" style="color:#ccc;font-size:10px">Game started — Player 1 goes first</div>
        </div>
      </div>
    </div>`;
  // Fit grid to available space: max ~530px wide for the grid area (960px wrap - 220px sidebar - gaps/padding)
  const maxGridPx=510;
  const cellSize=Math.min(32,Math.floor((maxGridPx-(G.puzzle.width*1.5))/G.puzzle.width));
  const fontSize=cellSize>24?12:cellSize>18?10:8;
  document.documentElement.style.setProperty('--cell-size',cellSize+'px');
  document.documentElement.style.setProperty('--cell-font',fontSize+'px');
  // Also update the grid template column width in JS-generated style
  const cg=document.getElementById('cw-grid');
  if(cg)cg.style.gridTemplateColumns=`repeat(${G.puzzle.width},${cellSize}px)`;
  renderGrid();
  renderSidebar();
  updateTurnUI();
  document.addEventListener('keydown',onKey,true);
}

function updateTurnUI(){
  const pill=document.getElementById('turn-pill');
  const tl=document.getElementById('turns-left');
  if(pill){pill.textContent='P'+G.currentPlayer;pill.className='player-pill p'+G.currentPlayer;}
  if(tl)tl.textContent=`${G.turnsLeft} turn${G.turnsLeft>1?'s':''} left`;
  const s1=document.getElementById('s1'),s2=document.getElementById('s2');
  if(s1)s1.textContent=G.scores[1];
  if(s2)s2.textContent=G.scores[2];
}

function onKey(e){
  if(G.gameOver)return;

  // Enter dismisses modal first
  if(e.key==='Enter'){
    e.preventDefault();
    const modal=document.getElementById('answer-modal');
    if(modal){closeAnswerModal();return;}
    submitAnswer();
    return;
  }

  // Tab / Shift+Tab: jump to next/prev clue
  if(e.key==='Tab'){
    e.preventDefault();
    if(e.shiftKey)prevClue();else nextClue();
    return;
  }

  // Spacebar: toggle direction on current cell
  if(e.key===' '){
    e.preventDefault();
    const cl=getActive();if(!cl)return;
    const targetDir=cl.dir==='across'?'down':'across';
    switchDirectionAtCursor(cl,targetDir);
    return;
  }

  const cl=getActive();if(!cl)return;

  if(e.key==='ArrowRight'){
    e.preventDefault();
    if(cl.dir==='across'){
      // Move right within word; at end jump to next across word start
      if(G.cursor<cl.cells.length-1){G.cursor++;highlightGrid();}
      else{
        // find next across clue in reading order
        const next=nextClueInDir('across',cl);
        if(next){G.activeKey=ck(next);G.cursor=0;renderSidebar();highlightGrid();}
      }
    } else {
      // In a down word — right arrow switches to across clue at cursor cell
      switchDirectionAtCursor(cl,'across');
    }
    return;
  }

  if(e.key==='ArrowLeft'){
    e.preventDefault();
    if(cl.dir==='across'){
      if(G.cursor>0){G.cursor--;highlightGrid();}
      else{
        const prev=prevClueInDir('across',cl);
        if(prev){G.activeKey=ck(prev);G.cursor=prev.cells.length-1;renderSidebar();highlightGrid();}
      }
    } else {
      switchDirectionAtCursor(cl,'across');
    }
    return;
  }

  if(e.key==='ArrowDown'){
    e.preventDefault();
    if(cl.dir==='down'){
      if(G.cursor<cl.cells.length-1){G.cursor++;highlightGrid();}
      else{
        const next=nextClueInDir('down',cl);
        if(next){G.activeKey=ck(next);G.cursor=0;renderSidebar();highlightGrid();}
      }
    } else {
      // In across word — down arrow switches to down clue at cursor cell
      switchDirectionAtCursor(cl,'down');
    }
    return;
  }

  if(e.key==='ArrowUp'){
    e.preventDefault();
    if(cl.dir==='down'){
      if(G.cursor>0){G.cursor--;highlightGrid();}
      else{
        const prev=prevClueInDir('down',cl);
        if(prev){G.activeKey=ck(prev);G.cursor=prev.cells.length-1;renderSidebar();highlightGrid();}
      }
    } else {
      switchDirectionAtCursor(cl,'down');
    }
    return;
  }

  if(e.key==='Backspace'){
    e.preventDefault();
    const k=cellK(cl,G.cursor);
    if(!G.solvedCells.has(k)&&G.typedCells[k]){
      delete G.typedCells[k];renderCellLetter(cl.cells[G.cursor],k);
    } else if(G.cursor>0){
      G.cursor--;
      const k2=cellK(cl,G.cursor);
      if(!G.solvedCells.has(k2)){delete G.typedCells[k2];renderCellLetter(cl.cells[G.cursor],k2);}
    }
    highlightGrid();return;
  }

  if(/^[a-zA-Z]$/.test(e.key)){
    e.preventDefault();
    const k=cellK(cl,G.cursor);
    if(!G.solvedCells.has(k)){G.typedCells[k]=e.key.toUpperCase();renderCellLetter(cl.cells[G.cursor],k);}
    // Advance cursor, skipping already-solved cells
    let next=G.cursor+1;
    while(next<cl.cells.length&&G.solvedCells.has(cellK(cl,next)))next++;
    if(next<cl.cells.length)G.cursor=next;
    highlightGrid();
  }
}

// Switch direction (across<->down) staying on same grid cell
function switchDirectionAtCursor(currentClue,targetDir){
  const [r,c]=currentClue.cells[Math.min(G.cursor,currentClue.cells.length-1)];
  const pool=Object.values(G.clues[targetDir]);
  const candidate=pool.find(cl=>
    !G.solvedClues.has(ck(cl))&&
    cl.cells.some(([rr,cc])=>rr===r&&cc===c)&&
    cl.cells.some(([rr,cc])=>isCellVisible(rr,cc))
  );
  if(!candidate)return;
  const cellIdx=candidate.cells.findIndex(([rr,cc])=>rr===r&&cc===c);
  G.activeKey=ck(candidate);
  G.cursor=cellIdx>=0?cellIdx:0;
  renderSidebar();highlightGrid();
}

// Get next clue in the same direction in reading order
function nextClueInDir(dir,currentClue){
  const pool=getOpenClues().filter(k=>k.startsWith(dir));
  const idx=pool.indexOf(ck(currentClue));
  if(idx===-1||idx>=pool.length-1)return getClue(pool[0]);
  return getClue(pool[idx+1]);
}

function prevClueInDir(dir,currentClue){
  const pool=getOpenClues().filter(k=>k.startsWith(dir));
  const idx=pool.indexOf(ck(currentClue));
  if(idx<=0)return getClue(pool[pool.length-1]);
  return getClue(pool[idx-1]);
}

function cellK(cl,i){return cl.cells[i][0]+','+cl.cells[i][1];}

function renderCellLetter([r,c],k){
  const el=document.getElementById(`c${r}_${c}`);if(!el||G.solvedCells.has(k))return;
  el.innerHTML='';
  if(G.numMap[k]){const nm=document.createElement('span');nm.className='cell-num';nm.textContent=G.numMap[k];el.appendChild(nm);}
  const ch=G.typedCells[k]||G.partialCells[k]||'';
  if(ch)el.appendChild(document.createTextNode(ch));
}

function prevClue(){
  const arr=getOpenClues();if(!arr.length)return;
  const idx=arr.indexOf(G.activeKey);
  switchTo(idx<=0?arr[arr.length-1]:arr[idx-1]);
}
function nextClue(){
  const arr=getOpenClues();if(!arr.length)return;
  const idx=arr.indexOf(G.activeKey);
  switchTo(idx>=arr.length-1?arr[0]:arr[idx+1]);
}
function switchTo(k){G.activeKey=k;G.cursor=0;G.typedCells={};renderSidebar();highlightGrid();}
function selectClue(k){switchTo(k);}

function submitAnswer(){
  const cl=getActive();if(!cl||G.gameOver)return;

  // For each cell: already-solved cells count as their correct letter automatically
  const enteredCells=cl.cells.map((_,i)=>{
    const k=cellK(cl,i);
    const [r,c]=cl.cells[i];
    if(G.solvedCells.has(k))return G.puzzle.solution[r][c].toUpperCase();
    return (G.typedCells[k]||G.partialCells[k]||'').toUpperCase().replace(/\s/g,'');
  });

  // Need all non-solved cells filled to submit
  if(enteredCells.some(ch=>ch==='')){
    const btn=document.getElementById('sub-btn');
    if(btn){btn.classList.add('shake');setTimeout(()=>btn.classList.remove('shake'),350);}
    return;
  }

  // Check each cell — already-solved cells are always correct
  const newPartial={};
  let correctCount=0;
  cl.cells.forEach(([r,c],i)=>{
    const k=r+','+c;
    const correct=G.puzzle.solution[r][c].toUpperCase();
    if(G.solvedCells.has(k)||enteredCells[i]===correct){correctCount++;newPartial[k]=correct;}
  });

  const isFullyCorrect=correctCount===cl.cells.length;
  // Points = only the cells the player actually had to fill (not already solved)
  const pts=cl.cells.filter(([r,c])=>!G.solvedCells.has(r+','+c)).length||cl.cells.length;

  if(isFullyCorrect){
    G.scores[G.currentPlayer]+=pts;
    G.solvedClues.add(ck(cl));
    const newlyUnlocked=[];
    cl.cells.forEach(([r,c],i)=>{
      const k=r+','+c;
      G.solvedCells.add(k);delete G.partialCells[k];delete G.typedCells[k];
      const q=G.quadrantMap[k];
      if(q!==undefined&&!G.openQuadrants.has(q)){G.openQuadrants.add(q);if(!newlyUnlocked.includes(q))newlyUnlocked.push(q);}
      const el=document.getElementById(`c${r}_${c}`);
      if(el){el.innerHTML='';el.className='cell correct';if(G.numMap[k]){const nm=document.createElement('span');nm.className='cell-num';el.appendChild(nm);}el.appendChild(document.createTextNode(cl.answer[i]));}
    });
    let bonusPts=0;
    if(newlyUnlocked.length){bonusPts=newlyUnlocked.length*5;G.scores[G.currentPlayer]+=bonusPts;playSound('unlock');}
    addLog(G.currentPlayer,cl,pts,bonusPts,true);
    const remain=getOpenClues();
    G.activeKey=remain.length?remain[0]:null;G.cursor=0;G.typedCells={};
    checkWin();
    if(!G.gameOver){
      showCorrectAnswer(cl,pts,bonusPts,()=>{advanceTurn();renderGrid();renderSidebar();updateTurnUI();});
    }
  } else {
    // Keep correct letters as partials, clear wrong ones
    cl.cells.forEach(([r,c],i)=>{
      const k=r+','+c;
      if(!G.solvedCells.has(k)){
        if(newPartial[k]){G.partialCells[k]=newPartial[k];}
        else{delete G.partialCells[k];}
        delete G.typedCells[k];
      }
    });
    addLog(G.currentPlayer,cl,0,0,false);
    G.typedCells={};
    showWrongAnswer(cl,correctCount,pts,()=>{
      advanceTurn();
      renderGrid();renderSidebar();updateTurnUI();
    });
  }
}

function playSound(type){
  try{
    const audio=new Audio(SOUNDS[type]);
    audio.play();
  }catch(e){}
}

const CORRECT_MSGS=['Nailed it!','Brilliant!','Well done!','Excellent!','Nice one!','Spot on!','Outstanding!','Crushed it!'];

function showCorrectAnswer(cl,pts,bonus,callback){
  playSound('correct');
  const existing=document.getElementById('answer-modal');if(existing)existing.remove();
  const wrap=document.getElementById('wrap');
  const modal=document.createElement('div');
  modal.id='answer-modal';
  modal.className='modal-bg';
  const nextP=G.currentPlayer===1?2:1;
  const msg=CORRECT_MSGS[Math.floor(Math.random()*CORRECT_MSGS.length)];
  const bonusLine=bonus?`<br><span style="background:#f5c842;color:#121212;font-size:11px;font-weight:700;padding:2px 8px;border-radius:2px;display:inline-block;margin-top:6px">+${bonus} quadrant bonus!</span>`:'';
  modal.innerHTML=`<div class="modal-box">
    <div class="modal-title" style="color:#1a7a1a">${msg}</div>
    <div class="modal-sub">
      +${pts} points for Player ${G.currentPlayer}!${bonusLine}<br><br>
      <b style="color:${nextP===1?'#121212':'#c00'}">Player ${nextP}'s turn</b>
    </div>
    <button class="win-btn" style="background:#1a7a1a" onclick="closeAnswerModal()">Next turn</button>
  </div>`;
  wrap.appendChild(modal);
  G._answerCallback=callback;
}

function showWrongAnswer(cl,correct,total,callback){
  playSound('wrong');
  const existing=document.getElementById('answer-modal');if(existing)existing.remove();
  const wrap=document.getElementById('wrap');
  const modal=document.createElement('div');
  modal.id='answer-modal';
  modal.className='modal-bg';
  const nextP=G.currentPlayer===1?2:1;
  const keptLine=correct>0?`${correct} of ${total} letters were correct and have been kept.<br>`:'No letters were correct.<br>';
  modal.innerHTML=`<div class="modal-box">
    <div class="modal-title" style="color:#c00">Not quite!</div>
    <div class="modal-sub">
      ${keptLine}Your turn is lost.<br><br>
      <b style="color:${nextP===1?'#121212':'#c00'}">Player ${nextP}'s turn</b>
    </div>
    <button class="win-btn" onclick="closeAnswerModal()">Got it</button>
  </div>`;
  wrap.appendChild(modal);
  G._answerCallback=callback;
}

function closeAnswerModal(){
  const m=document.getElementById('answer-modal');if(m)m.remove();
  if(G._answerCallback){G._answerCallback();G._answerCallback=null;}
}

function passTurn(){
  G.typedCells={};
  addLog(G.currentPlayer,null,0,0,null);
  advanceTurn();
  renderGrid();renderSidebar();updateTurnUI();
}

function advanceTurn(){
  G.turnsLeft--;
  if(G.turnsLeft<=0){
    G.turnCount++;
    G.currentPlayer=G.currentPlayer===1?2:1;
    G.turnsLeft=1;
  }
}

function addLog(player,cl,pts,bonus,success){
  const pspan=`<span class="li-p${player}">P${player}</span>`;
  let msg='';
  if(success===null){msg=`${pspan} passed their turn`;}
  else if(success){msg=`${pspan} solved <b>${cl.num}${cl.dir==='across'?'A':'D'}</b> (+${pts} pts)${bonus?`<span class="bonus-flash">+${bonus} bonus!</span>`:''}` ;}
  else{msg=`${pspan} missed <b>${cl.num}${cl.dir==='across'?'A':'D'}</b> — turn lost`;}
  G.log.unshift(msg);
  const el=document.getElementById('game-log');
  if(el)el.innerHTML=G.log.slice(0,15).map(l=>`<div class="log-item">${l}</div>`).join('');
}

function renderGrid(){
  const{width:w,height:h,solution:sol}=G.puzzle;
  const cg=document.getElementById('cw-grid');if(!cg)return;
  cg.innerHTML='';
  for(let r=0;r<h;r++)for(let c=0;c<w;c++){
    const el=document.createElement('div');
    el.id=`c${r}_${c}`;
    const k=r+','+c;
    if(sol[r][c]==='.'){el.className='cell black';}
    else if(!isCellVisible(r,c)){el.className='cell hidden';}
    else{
      const solved=G.solvedCells.has(k);
      if(solved){
        el.className='cell correct';
        if(G.numMap[k]){const nm=document.createElement('span');nm.className='cell-num';el.appendChild(nm);}
        el.appendChild(document.createTextNode(sol[r][c]));
      } else {
        const hasPartial=!!G.partialCells[k];
        el.className='cell open'+(hasPartial?' partial':'');
        if(G.numMap[k]){const nm=document.createElement('span');nm.className='cell-num';nm.textContent=G.numMap[k];el.appendChild(nm);}
        const ch=G.typedCells[k]||G.partialCells[k]||'';
        if(ch)el.appendChild(document.createTextNode(ch));
        const rr=r,cc=c;el.addEventListener('click',()=>onCellClick(rr,cc));
      }
    }
    cg.appendChild(el);
  }
  highlightGrid();
}

function onCellClick(r,c){
  const k=r+','+c;if(!isCellVisible(r,c)||G.solvedCells.has(k))return;
  const candidates=[];
  for(const cl of Object.values(G.clues.across)){if(!G.solvedClues.has(ck(cl))&&cl.cells.some(([rr,cc])=>rr===r&&cc===c)&&cl.cells.some(([rr,cc])=>isCellVisible(rr,cc)))candidates.push(cl);}
  for(const cl of Object.values(G.clues.down)){if(!G.solvedClues.has(ck(cl))&&cl.cells.some(([rr,cc])=>rr===r&&cc===c)&&cl.cells.some(([rr,cc])=>isCellVisible(rr,cc)))candidates.push(cl);}
  if(!candidates.length)return;
  const curKey=G.activeKey;
  const alreadySelected=candidates.find(c=>ck(c)===curKey);
  const chosen=alreadySelected?candidates.find(c=>ck(c)!==curKey)||candidates[0]:candidates[0];
  const cellIdx=chosen.cells.findIndex(([rr,cc])=>rr===r&&cc===c);
  G.activeKey=ck(chosen);G.cursor=cellIdx>=0?cellIdx:0;G.typedCells={};
  renderSidebar();highlightGrid();
}

function highlightGrid(){
  document.querySelectorAll('.cell.hl-word,.cell.hl-cursor').forEach(el=>el.classList.remove('hl-word','hl-cursor','dir-d'));
  const cl=getActive();if(!cl)return;
  const cursorK=G.cursor<cl.cells.length?cellK(cl,G.cursor):null;
  for(const [r,c] of cl.cells){
    const k=r+','+c;if(G.solvedCells.has(k)||!isCellVisible(r,c))continue;
    const el=document.getElementById(`c${r}_${c}`);if(!el)continue;
    if(k===cursorK)el.classList.add('hl-cursor');
    else{el.classList.add('hl-word');if(cl.dir==='down')el.classList.add('dir-d');}
  }
}

function renderSidebar(){
  const cl=getActive();
  const badge=document.getElementById('act-dir-wrap');
  const num=document.getElementById('act-num');
  const text=document.getElementById('act-text');
  const sub=document.getElementById('sub-btn');
  if(badge)badge.innerHTML=cl?`<span class="clue-dir ${cl.dir}">${cl.dir}</span>`:'';
  if(num)num.textContent=cl?`${cl.num} — ${cl.cells.length} letters`:'';
  if(text)text.textContent=cl?cl.clue:'No active clue';
  if(sub)sub.disabled=!cl;
  renderOpenClues();
}

function renderOpenClues(){
  const list=document.getElementById('open-clue-list');if(!list)return;
  const arr=getOpenClues();
  if(!arr.length){list.innerHTML='<div style="font-size:10px;color:#ccc;padding:2px">None yet</div>';return;}
  list.innerHTML=arr.map(k=>{
    const cl=getClue(k);if(!cl)return'';
    const sel=k===G.activeKey;
    return`<div class="clue-row${sel?' selected':''}" onclick="selectClue('${k}')">
      <span class="cr-dir ${cl.dir}">${cl.dir==='across'?'A':'D'}</span>
      <span class="cr-num">${cl.num}</span>
      <span class="cr-text">${cl.clue.length>40?cl.clue.slice(0,40)+'…':cl.clue}</span>
    </div>`;
  }).join('');
}

function checkWin(){
  const total=Object.keys(G.clues.across).length+Object.keys(G.clues.down).length;
  if(G.solvedClues.size>=total){G.gameOver=true;document.removeEventListener('keydown',onKey,true);showWin();}
}

function showWin(){
  const wrap=document.getElementById('wrap');
  const modal=document.createElement('div');
  modal.className='modal-bg';
  const winner=G.scores[1]>G.scores[2]?'Player 1 wins!':G.scores[2]>G.scores[1]?'Player 2 wins!':'It\'s a tie!';
  modal.innerHTML=`<div class="modal-box">
    <div class="modal-title">${winner}</div>
    <div class="modal-sub">Player 1: <b>${G.scores[1]} pts</b><br>Player 2: <b>${G.scores[2]} pts</b><br><br>Thanks for playing Acrossword!</div>
    <button class="win-btn" onclick="location.reload()">Play again</button>
  </div>`;
  wrap.appendChild(modal);
}
</script>
</body>
</html>
